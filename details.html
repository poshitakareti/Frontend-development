<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container" id="detail-container" style="display: none;">
    <div class="image-side">
      <img id="product-img" src="" alt="">
    </div>
    <div class="info-side">
      <span class="category" id="product-category"></span>
      <h1 id="product-title"></h1>
      <div class="rating" id="product-rating">Rating:</div>
      <div class="price" id="product-price">Price:</div>
      <p class="description" id="product-desc">Description:</p>
    </div>
  </div>

  <div id="loading-text" class="loading">Loading product data...</div>

  <script src="script.js"></script>
</body>
</html>
